<table class="table table-striped border">
	<thead>
		<tr>
			<th scope="col">Id</th>
			<th scope="col">Título</th>
			<th scope="col">Tipo</th>
			<th scope="col">Fecha de Generación</th>
			<th scope="col">Generado por</th>
			<th scope="col">Estado</th>
		</tr>
	</thead>
	<tbody>
		@for (report of reports; track report) {
			<tr>
				<th scope="row">{{ report.id }}</th>
				<td>{{ report.title }}</td>
				<td>
					<app-badge 
						[text]="report.type"
						[type]="typeMap[report.type]" >
					</app-badge>
				</td>
				<td>{{ report.generatedDate }}</td>
				<td>{{ report.generatedBy }}</td>
				<td>
					<app-badge 
						[text]="report.status"
						[type]="statusMap[report.status]" >
					</app-badge>
				</td>
			</tr>
		}
	</tbody>
</table>
